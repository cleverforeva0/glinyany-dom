<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админка — Глиняный дом</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />

  <style>
    body {
      background: #f7f2ec;
    }

    .admin-shell {
      min-height: 100vh;
      padding: 40px 0;
    }

    .admin-card {
      background: #fffaf6;
      border: 1px solid rgba(70, 50, 40, 0.08);
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(50, 35, 30, 0.05);
      padding: 24px;
    }

    .admin-title {
      font-family: 'Playfair Display', serif;
      color: #2d201b;
      margin-bottom: 8px;
    }

    .admin-subtitle {
      color: #6a5a53;
      margin-bottom: 0;
    }

    .admin-section-title {
      font-family: 'Playfair Display', serif;
      color: #2d201b;
      margin-bottom: 16px;
      font-size: 30px;
    }

    .admin-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .admin-hidden {
      display: none;
    }

    .preview-box {
      width: 100%;
      max-width: 220px;
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      overflow: hidden;
      background: #efe6de;
      border: 1px solid rgba(70, 50, 40, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #7b6b63;
      font-size: 14px;
    }

    .preview-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .admin-table-wrap {
      overflow-x: auto;
    }

    .admin-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 18px;
      overflow: hidden;
    }

    .admin-table th,
    .admin-table td {
      padding: 12px 14px;
      border-bottom: 1px solid #eee4dc;
      text-align: left;
      vertical-align: middle;
    }

    .admin-table th {
      background: #f4ece5;
      color: #2d201b;
      font-weight: 600;
    }

    .admin-login-wrap {
      max-width: 460px;
      margin: 0 auto;
    }

    .small-muted {
      color: #7a6b64;
      font-size: 14px;
    }

    .success-note,
    .error-note {
      display: none;
      border-radius: 14px;
      padding: 12px 14px;
      margin-bottom: 14px;
      font-size: 14px;
    }

    .success-note {
      background: #e9f4e7;
      color: #355b31;
    }

    .error-note {
      background: #fbe7e7;
      color: #8a2f2f;
    }
  </style>
</head>
<body>

<div class="container admin-shell">
  <div id="login-view" class="admin-login-wrap">
    <div class="admin-card">
      <h1 class="admin-title">Вход в админ-панель</h1>
      <p class="admin-subtitle">Введите логин и пароль администратора.</p>

      <div id="login-error" class="error-note"></div>

      <form id="login-form" class="mt-4">
        <input type="text" id="admin-login" class="form-control mb-3" placeholder="Логин" required>
        <input type="password" id="admin-password" class="form-control mb-3" placeholder="Пароль" required>
        <button type="submit" class="btn custom-btn-dark w-100">Войти</button>
      </form>

      <p class="small-muted mt-3 mb-0">
        Это демонстрационный вход для дипломного проекта.
      </p>
    </div>
  </div>

  <div id="admin-view" class="admin-hidden">
    <div class="admin-topbar">
      <div>
        <h1 class="admin-title mb-1">Админ-панель</h1>
        <p class="admin-subtitle">Управление категориями и товарами</p>
      </div>

      <div class="d-flex gap-2 flex-wrap">
        <a href="index.html" class="btn custom-btn-light">На сайт</a>
        <button id="logout-btn" class="btn custom-btn-dark">Выйти</button>
      </div>
    </div>

    <div id="global-success" class="success-note"></div>
    <div id="global-error" class="error-note"></div>

    <div class="row g-4">
      <div class="col-lg-5">
        <div class="admin-card mb-4">
          <h2 class="admin-section-title">Добавление категории</h2>

          <form id="category-form">
            <input type="text" id="category-name" class="form-control mb-3" placeholder="Название категории" required>
            <input type="text" id="category-description" class="form-control mb-3" placeholder="Описание категории">

            <label class="form-label">Фото категории</label>
            <input type="file" id="category-image-file" class="form-control mb-2" accept="image/*">
            <input type="text" id="category-image" class="form-control mb-3" placeholder="Ссылка на изображение">

            <div class="preview-box mb-3" id="category-preview-box">
              <span id="category-preview-text">Предпросмотр</span>
              <img id="category-preview-img" alt="Превью категории">
            </div>

            <button type="submit" class="btn custom-btn-dark w-100">Добавить категорию</button>
          </form>
        </div>

        <div class="admin-card">
          <h2 class="admin-section-title">Добавление товара</h2>

          <form id="product-form">
            <input type="text" id="product-name" class="form-control mb-3" placeholder="Название товара" required>
            <input type="text" id="product-description" class="form-control mb-3" placeholder="Описание товара" required>
            <input type="number" id="product-price" class="form-control mb-3" placeholder="Цена" required>

            <label class="form-label">Фото товара</label>
            <input type="file" id="product-image-file" class="form-control mb-2" accept="image/*">
            <input type="text" id="product-image" class="form-control mb-3" placeholder="Ссылка на изображение">

            <div class="preview-box mb-3" id="product-preview-box">
              <span id="product-preview-text">Предпросмотр</span>
              <img id="product-preview-img" alt="Превью товара">
            </div>

            <select id="product-category" class="form-select mb-3" required></select>

            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" id="product-sale">
              <label class="form-check-label" for="product-sale">
                Товар участвует в распродаже
              </label>
            </div>

            <button type="submit" class="btn custom-btn-dark w-100">Добавить товар</button>
          </form>
        </div>
      </div>

      <div class="col-lg-7">
        <div class="admin-card mb-4">
          <h2 class="admin-section-title">Категории</h2>
          <div class="admin-table-wrap" id="categories-list"></div>
        </div>

        <div class="admin-card mb-4">
          <h2 class="admin-section-title">Товары</h2>
          <div class="admin-table-wrap" id="products-list"></div>
        </div>
        <div class="admin-card">
          <h2 class="admin-section-title">Заказы</h2>
          <div id="orders-summary" class="mb-3"></div>
          <div class="admin-table-wrap" id="orders-list"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/admin.js"></script>
</body>
</html>
